<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chai aur Code | DOM Manipulation</title>
</head>
<body style="background-color: #212121; color: #ffffff">
    <ul class="language">
        <li>Javascript</li>
    </ul>
</body>
<script>
    function addLanguage(langName) {
        const li = document.createElement('li')
        li.innerHTML = `${langName}`
        document.querySelector('.language').appendChild(li)
    }
    addLanguage("Python")
    addLanguage("Java")

    function addOptiLanguage(langName) {
        const li = document.createElement('li')
        li.appendChild(document.createTextNode(langName))
        document.querySelector('.language').appendChild(li)
    }
    addOptiLanguage("C++")
    addOptiLanguage("C#")

    //Edit
    const secondLang = document.querySelector("li:nth-child(2)")
    //secondLang.innerHTML = "TypeScript"
    //Another GOOD way to do same thing
    const newLi = document.createElement('li')
    newLi.textContent = "Typescript"
    secondLang.replaceWith(newLi)
    //3rd way of editing
    const firstLng = document.querySelector("li:first-child")
    firstLng.outerHTML = "<li>Python</li>"

    //REMOVE
    const lastLang = document.querySelector('li:last-child')
    lastLang.remove()
</script>
</html>
