<!DOCTYPE html>

<body style="background-color: #212121; color: #ffffff">
    
</body>
<script>
    const div = document.createElement('div');
    console.log(div);
    div.className = "main";
    div.id= Math.round(Math.random() * 10 + 1);
    div.setAttribute("title", "generated title")
    div.style.backgroundColor = "green";
    div.style.padding = "12px";
    //div.innerText = "Chai aur Code" -- Not considered best to use 
    const addText = document.createTextNode("Chai aur Code");
    div.appendChild(addText);
    document.body.appendChild(div);   // This meathod is used to add the element in the body of the document. We can also use it to add the element in any other element by using that element instead of document.body. For example, if we want to add the element in a div with id "container", we can use document.getElementById("container").appendChild(div);
</script>
</html>
